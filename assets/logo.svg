<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon box -->
  <rect x="4" y="8" width="44" height="44" rx="10" fill="url(#grad)" opacity="0.15"/>
  <rect x="4" y="8" width="44" height="44" rx="10" fill="none" stroke="url(#grad)" stroke-width="1.5"/>
  <!-- Link icon -->
  <text x="26" y="36" text-anchor="middle" font-size="22" fill="url(#grad)" filter="url(#glow)" font-family="Arial">⇔</text>
  <!-- LINKGUARD text -->
  <text x="58" y="30" font-family="'Arial Black',sans-serif" font-size="17" font-weight="900" letter-spacing="2" fill="url(#grad)" filter="url(#glow)">LINKGUARD</text>
  <!-- ELITE text -->
  <text x="58" y="47" font-family="'Arial Black',sans-serif" font-size="11" font-weight="700" letter-spacing="5" fill="#f472b6" opacity="0.85">ELITE</text>
</svg>
